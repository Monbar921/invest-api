name: Java CI/CD Pipeline

on:
  push:
    branches: [ "master", "uat", "develop" ]
  pull_request:
    branches: [ "main", "uat" ]

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ============================================
      # 🚀 MAVEN DEPENDENCY CACHING - ADDED
      # ============================================

      - name: 💾 Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          # Cache Maven local repository
          path: ~/.m2/repository
          # Generate unique cache key based on OS and pom.xml files
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          # Restore from most recent cache if exact match not found
          restore-keys: |
            ${{ runner.os }}-maven-
            ${{ runner.os }}-

      - name: 🔨 Build & Package All Modules
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 BUILDING MULTI-MODULE PROJECT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          mvn clean package -DskipTests

      - name: 🧪 Run Tests
        run: mvn test

      - name: 📋 List All Generated JARs
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 GENERATED JAR FILES"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          find . -name "*.jar" -not -path "*/.*" | grep -v "original" | while read jar; do
            echo "  📄 $jar"
            ls -lh "$jar" | awk '{print "     Size: " $5}'
          done

