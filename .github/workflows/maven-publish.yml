name: Java CI/CD Pipeline

on:
  push:
    branches: [ "master", "uat", "develop" ]
  pull_request:
    branches: [ "main", "uat" ]

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔨 Build & Package All Modules
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 BUILDING MULTI-MODULE PROJECT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          mvn clean package -DskipTests

      - name: 🧪 Run Tests
        run: mvn test

      - name: 📋 List All Generated JARs
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 GENERATED JAR FILES"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          find . -name "*.jar" -not -path "*/.*" | grep -v "original" | while read jar; do
            echo "  📄 $jar"
            ls -lh "$jar" | awk '{print "     Size: " $5}'
          done

      # ============================================
      # v4 ARTIFACT UPLOADS - KEY CHANGES
      # ============================================

      - name: 💾 Upload Individual Module JARs (v4 - with matrix suffix)
        run: |
          # Upload each JAR as a separate artifact with module name suffix
          find . -name "*.jar" -not -path "*/.*" | grep -v "original" | while read jar; do
            module_name=$(echo "$jar" | cut -d'/' -f2)
            jar_name=$(basename "$jar" .jar)
          
            # Create a unique name for v4 (no duplicate artifact names allowed)
            artifact_name="${module_name}-${jar_name}-${{ github.run_id }}"
          
            echo "Preparing to upload: $jar as $artifact_name"
          
            # Copy to a staging directory with unique name
            mkdir -p staging/$artifact_name
            cp "$jar" staging/$artifact_name/
          done

      - name: ⬆️ Upload All Module JARs (v4)
        uses: actions/upload-artifact@v4
        with:
          name: all-module-jars-${{ github.run_id }}
          path: staging/*/
          if-no-files-found: error
          compression-level: 6  # 0 = fastest, 9 = smallest (new v4 option)
          retention-days: 7
