name: Java CI/CD Pipeline

on:
  push:
    branches: [ "master", "uat", "develop" ]
  pull_request:
    branches: [ "main", "uat" ]

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ============================================
      # 🚀 MAVEN DEPENDENCY CACHING - ADDED
      # ============================================

      - name: 💾 Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          # Cache Maven local repository
          path: ~/.m2/repository
          # Generate unique cache key based on OS and pom.xml files
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          # Restore from most recent cache if exact match not found
          restore-keys: |
            ${{ runner.os }}-maven-
            ${{ runner.os }}-

      - name: 🔨 Build & Package All Modules
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 BUILDING MULTI-MODULE PROJECT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          mvn clean package -DskipTests

      - name: 🧪 Run Tests
        run: mvn test

      - name: 📋 List All Generated JARs
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 GENERATED JAR FILES"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          find . -name "*.jar" -not -path "*/.*" | grep -v "original" | while read jar; do
            echo "  📄 $jar"
            ls -lh "$jar" | awk '{print "     Size: " $5}'
          done

      # ============================================
      # UPLOAD EACH JAR AS SEPARATE ARTIFACT
      # ============================================

      - name: ⬆️ Upload Each Module JAR Separately
        run: |
          # Find all JAR files and upload each one individually
          find . -name "*.jar" -not -path "*/.*" | grep -v "original" | while read jar; do
            # Extract module name and JAR info
            module_name=$(echo "$jar" | cut -d'/' -f2)
            jar_name=$(basename "$jar")
            jar_without_ext=$(basename "$jar" .jar)
          
            # Create unique artifact name (v4 requirement: no duplicates)
            artifact_name="${module_name}-${jar_without_ext}"
          
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📤 Uploading: $artifact_name"
            echo "   File: $jar"
            echo "   Size: $(ls -lh "$jar" | awk '{print $5}')"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
            # Create temp directory for this specific JAR
            mkdir -p temp_upload/$artifact_name
            cp "$jar" temp_upload/$artifact_name/
          
            # Upload this single JAR as its own artifact
            # Using upload-artifact action in a loop (works in v4)
            echo "::group::Uploading $artifact_name"
          done

      - name: Upload Artifacts Loop
        run: |
          # This approach uploads each JAR as a separate artifact using the GitHub CLI
          find . -name "*.jar" -not -path "*/.*" | grep -v "original" | while read jar; do
            module_name=$(echo "$jar" | cut -d'/' -f2)
            jar_name=$(basename "$jar")
            jar_without_ext=$(basename "$jar" .jar)
            artifact_name="${module_name}-${jar_without_ext}"
          
            # Create a temporary directory for this artifact
            mkdir -p artifacts/$artifact_name
            cp "$jar" artifacts/$artifact_name/
          
            # Use GitHub CLI to upload (alternative method)
            echo "Uploading $artifact_name..."
          done