name: Java CI/CD Pipeline

on:
  push:
    branches: [ "master", "uat", "develop" ]
  pull_request:
    branches: [ "main", "uat" ]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 💾 Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 🔨 Build & Package All Modules
        run: mvn clean package -DskipTests

      - name: 🧪 Run Tests
        run: mvn test

      - name: 📋 List All Generated JARs
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 GENERATED JAR FILES"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          find . -name "*.jar" -not -path "*/.*" | grep -v "original" | while read jar; do
            echo "  📄 $jar"
          done

      # ============================================
      # UPLOAD USING SINGLE ARCHIVE (SIMPLEST)
      # ============================================

      - name: ⬆️ Upload All JARs
        uses: actions/upload-artifact@v4
        with:
          name: all-module-jars-${{ github.run_id }}
          path: |
            **/target/*.jar
            !**/target/original-*.jar
          if-no-files-found: error
          compression-level: 6
          retention-days: 7