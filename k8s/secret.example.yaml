# Шаблон — не коммитьте реальные значения.
# Перед деплоем создайте secret вручную или через CI:
#
#   kubectl create secret generic invest-api-secret \
#     --namespace invest-api \
#     --from-literal=TOKEN=<your-tinkoff-token>
#
# Либо заполните поле ниже base64-значением (echo -n 'value' | base64)
# и примените: kubectl apply -f k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: invest-api-secret
  namespace: invest-api
type: Opaque
stringData:
  TOKEN: "REPLACE_ME"
