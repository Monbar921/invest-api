# Требует установленного nginx-ingress-controller на кластере.
# Установка: https://kubernetes.github.io/ingress-nginx/deploy/
#
# Замените invest-api.example.com на ваш домен.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: invest-api
  namespace: invest-api
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Раскомментируйте для автоматического TLS через cert-manager:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: invest-api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: invest-api
                port:
                  number: 80
  # Раскомментируйте для TLS:
  # tls:
  #   - hosts:
  #       - invest-api.example.com
  #     secretName: invest-api-tls
