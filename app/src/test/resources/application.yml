server:
  port: 8099

invest:
  enabled: true
  connector:
    token: ${TOKEN}

ru:
  invest:
    api:
      stock:
        supplier:
          scheduler:
            enabled: false
            cron: "0 0 0 * * ?"
spring:
  cache:
    type: caffeine
  cloud:
    openfeign:
      autoconfiguration:
        jackson:
          enabled: true
      client:
        config:
          invest-api-client:
            url: http://localhost:8099
          cb-rf-client:
            enabled: true
            url: https://www.cbr.ru/
          budget-org-client:
            enabled: true
            url: https://api.budjet.org/